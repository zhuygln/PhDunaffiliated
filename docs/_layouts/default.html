<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.url == "/" %}{{ site.title }}{% else %}{{ page.title }} — {{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
</head>
<body>
  <div class="site-container">
    <header>
      <nav>
        <a class="site-name" href="{{ site.baseurl }}/">{{ site.title }}</a>
        <a href="{{ site.baseurl }}/publications/"{% if page.url contains "/publications" %} class="active"{% endif %}>Publications</a>
        <a href="{{ site.baseurl }}/projects/"{% if page.url contains "/projects" %} class="active"{% endif %}>Projects</a>
        <a href="{{ site.baseurl }}/progress/"{% if page.url contains "/progress" %} class="active"{% endif %}>Progress</a>
        <a href="{{ site.baseurl }}/writing/"{% if page.url contains "/writing" %} class="active"{% endif %}>Writing</a>
        <a href="{{ site.baseurl }}/about/"{% if page.url == "/about/" %} class="active"{% endif %}>About</a>
      </nav>
    </header>
    <main>
      {{ content }}
    </main>
    <footer>
      <div class="footer-social">
        <a href="https://github.com/zhuygln" target="_blank">GitHub</a>
        <span>·</span>
        <a href="https://scholar.google.com/citations?user=5zl5bT4AAAAJ&hl=en" target="_blank">Google Scholar</a>
      </div>
      <div class="footer-copy">© {{ site.time | date: '%Y' }} {{ site.title }}</div>
    </footer>
  </div>
</body>
</html>
